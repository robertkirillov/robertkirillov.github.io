<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Glia white-screen repro (CE-15568)</title>
<style>
  /* ---- HOST SITE (mimics the client) ---- */
  html, body { margin: 0; height: 100%; }
  body { display: flex; min-height: 100vh; font-family: system-ui, sans-serif; } /* the trigger */
  .site-nav  { width: 240px; background: #1f2a44; color: #fff; padding: 24px; box-sizing: border-box; }
  .site-main { flex: 1; padding: 32px; background: #f4f6fb; }
  .controls button { margin: 4px 6px 0 0; padding: 8px 12px; cursor: pointer; }

  /* ---- GLIA-INJECTED CSS (faithful to visitor-app) ---- */
  #salemove { display: block !important; }                 /* app.js root, default.scss */
  #salemove .sm-visitor-app {                              /* style_bundle.scss:187 - position:fixed */
    position: fixed; right: 16px; bottom: 16px; width: 320px; height: 460px;
    background: #fff; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,.25);
    z-index: 2147483647; padding: 16px; box-sizing: border-box;
  }
  /* WIDGET MODE on (body.sm-draggable) - draggable.scss:17-26: no width, padding-right:0 */
  body.sm-draggable.sm-engaged #sm-wrapped-page { box-sizing: border-box; padding-right: 0; position: relative; }
  /* SIDEBAR MODE (widget_mode off) - style_bundle.scss:88: reserves 270px = a definite box */
  body:not(.sm-draggable).sm-engaged #sm-wrapped-page { box-sizing: border-box; padding-right: 270px; }

  /* ---- PROPOSED FIX (toggled by the button; see section 2 for the real client CSS) ---- */
  body.glia-fix.sm-engaged > #sm-wrapped-page { flex: 1 1 auto; min-width: 0; width: 100%; }
</style>
</head>
<body>
  <nav class="site-nav"><h3>Acme Loans</h3><p>Dashboard</p><p>Payments</p><p>Documents</p></nav>
  <main class="site-main">
    <h1>Your loan overview</h1>
    <p>Client's normal page. <code><body></code> uses <code>display:flex</code>.</p>
    <div class="controls">
      <button id="reset">Reset (healthy)</button>
      <button id="widget">Break: widget mode</button>
      <button id="sidebar">Sidebar mode (widget off)</button>
      <button id="fix">Toggle fix</button>
    </div>
    <p id="state" style="margin-top:20px;font-weight:bold"></p>
  </main>

<script>
  // Faithful to: page_wrapper.js (wrap body children into #sm-wrapped-page),
  // app.js (append #salemove), Engagement/SideBar (body.sm-engaged),
  // Draggable.js (body.sm-draggable when widget_mode is on).
  function engage(widgetMode) {
    reset();
    var wrapper = document.createElement('div');
    wrapper.id = 'sm-wrapped-page'; wrapper.className = 'sm-wrapped-page';
    Array.prototype.slice.call(document.body.children).forEach(function (c) {
      if (c.id === 'salemove') return;
      wrapper.appendChild(c);
    });
    document.body.insertBefore(wrapper, document.body.firstChild);
    var salemove = document.createElement('div');
    salemove.id = 'salemove'; salemove.className = 'salemove';
    salemove.innerHTML = '<div class="sm-visitor-app"><b>Glia engagement</b><p>Chat panel...</p></div>';
    document.body.appendChild(salemove);
    document.body.classList.add('sm-engaged');
    if (widgetMode) document.body.classList.add('sm-draggable');
    setState();
  }
  function reset() {
    var w = document.getElementById('sm-wrapped-page'), sm = document.getElementById('salemove');
    if (w) { while (w.firstChild) document.body.insertBefore(w.firstChild, w); document.body.removeChild(w); }
    if (sm) document.body.removeChild(sm);
    document.body.classList.remove('sm-engaged','sm-draggable','glia-fix');
    setState();
  }
  function setState() {
    var b = document.body;
    document.getElementById('state').textContent = b.classList.contains('sm-engaged')
      ? ('engaged | widget(sm-draggable)=' + b.classList.contains('sm-draggable') + ' | fix=' + b.classList.contains('glia-fix'))
      : 'Idle (healthy)';
  }
  document.getElementById('reset').onclick   = reset;
  document.getElementById('widget').onclick  = function(){ engage(true); };
  document.getElementById('sidebar').onclick = function(){ engage(false); };
  document.getElementById('fix').onclick     = function(){ document.body.classList.toggle('glia-fix'); setState(); };
  engage(true); // load in the broken state
</script>
</body>
</html>
